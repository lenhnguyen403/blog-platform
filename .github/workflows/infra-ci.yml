name: Continuous Integration Pipeline - Infrastructure
run-name: >
  Infrastructure CI - ${{ github.ref_name }} - ${{ github.actor }}

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'config-server/**'
      - 'discovery-server/**'
      - '.github/workflows/infra-ci.yml'
  pull_request:
    branches:
      - main
      - develop
    paths:
      - 'config-server/**'
      - 'discovery-server/**'
      - '.github/workflows/infra-ci.yml'

permissions:
  contents: read

concurrency:
  group: infra-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  JAVA_VERSION: 21

jobs:
  detect-changes:
    name: Detect Changed Modules
    runs-on: ubuntu-latest
    timeout-minutes: 5

    outputs:
      config: ${{ steps.filter.outputs.config }}
      discovery: ${{ steps.filter.outputs.discovery }}

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Detect changed modules
        id: filter
        uses: dorny/paths-filter@v3
        with:
          filters: |
            config: 
              - 'config-server/**'
              - '.github/workflows/infra.yml'
            discovery: 
              - 'discovery-server/**'
              - '.github/workflows/infra.yml'

  # Build Config Server
  build-config-server:
    name: Build Config Server
    needs: detect-changes
    timeout-minutes: 15

    if: needs.detect-changes.outputs.config == 'true'

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: config-server

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Grant execute permission
        run: chmod +x mvnw

      - name: Build
        run: ./mvnw clean verify

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: config-server
          path: config-server/target/*.jar

  # Build Discovery Server
  build-discovery-server:
    name: Build Discovery Server
    needs: detect-changes
    timeout-minutes: 15

    if: needs.detect-changes.outputs.discovery == 'true'

    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: discovery-server

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Setup JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: maven

      - name: Grant execute permission
        run: chmod +x mvnw

      - name: Build
        run: ./mvnw clean verify

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: discovery-server
          path: discovery-server/target/*.jar