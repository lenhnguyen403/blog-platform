name: Continuous Integration Pipeline for Business Logic
run-name: ${{ github.actor }}

on:
  push:
    branches:
      - main

jobs:
  ci-pipeline:
    name: Build CI pipeline
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup Java 21
        uses: actions/setup-java@v5
        with:
          distribution: 'corretto'
          java-version: '21'
          cache: 'maven'

      - name: Run tests (Unit Test & Integration Test)
        run: mvn test

      - name: Build with Maven
        run: mvn package -DskipTests

