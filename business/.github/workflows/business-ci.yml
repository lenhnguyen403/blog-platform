name: Continuous Integration Pipeline for Business Logic
run-name: ${{ github.actor }}

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

env:
  JAVA_VERSION: 21

jobs:

  ##############################
  ## BUILD + TEST
  ##############################

  build:
    name: Build Multi Module
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: .

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}
          cache: 'maven'

      - name: Grant execute permission
        run: chmod +x mvnw

      - name: Validate
        run: ./mvnw validate

      - name: Run Compile
        run: ./mvnw compile

      - name: Run tests (Unit Test & Integration Test)
        run: ./mvnw test

      - name: Build Package
        run: ./mvnw package -DskipTests

      - name: Upload JARs
        uses: actions/upload-artifact@v4
        with:
          name: business-artifacts
          path: |
            **/target/*.jar

